<page-header class="pointer-events-none select-none" [title]="'Projects'" description="Short notes on front-end related topics." />
<section-title
        data-accent="violet"
        [title]="'The dynamic accent colors.'"
        caption="tailwindcss-accent"
        description="Add accent colors for dynamic, flexible color use in your Tailwind CSS project."
        [button]="{title: 'learn more', href : ''}">
</section-title>
<app-section-content>
    <div class="flex lg:gap-12">
        <div class="hidden flex-1 flex-col gap-3 pt-8 lg:flex" data-accent="violet">
            <div class="flex flex-col gap-3">
                <app-section-button
                        title="Available on GitHub"
                        [icon]="Icons.GitHub"
                        description="Access powerful and flexible package on GitHub with MIT license."
                        [active]="currentState === 'github'"
                        (clickEvent)="setCurrentState('github')"
                ></app-section-button>
                <app-section-button
                        title="npm package"
                        [icon]="Icons.Npm"
                        description="Install and use the package with ease thanks to its typed options."
                        [active]="currentState === 'npm'"
                        (clickEvent)="setCurrentState('npm')"
                ></app-section-button>
            </div>
        </div>
        <div class="w-full lg:w-auto">
            <div class="-mt-[41px]">
                <div class="w-full lg:h-[400px] lg:w-[600px]">
                    <app-app-window
                            type="browser"
                            [browserTabs]="browserTabs">
                        <ng-container *ngIf="currentState == 'github'">
                            <github-wireframe
                                    author="sergiosessanta9"
                                    license="MIT"
                                    repository="tailwindcss-accent"
                                    description="Adds accent colors for more dynamic and flexible color utilization."/>
                        </ng-container>
                        <ng-container *ngIf="currentState === 'npm'">
                            GINO
                        </ng-container>
                    </app-app-window>
                </div>
            </div>
        </div>
    </div>
</app-section-content>
