<div class="flex flex-col gap-2" [@animation]="animateInStart">
  <div class="px-2 text-xl font-bold">
    Action Center
  </div>

  <div class="flex flex-1 flex-col gap-8 p-2">
    <div class="relative flex h-24 gap-4">

      <action-center-button
        class="flex flex-1"
        [active]="theme == 'dark'"
        [text]="theme == 'dark' ? 'Dark Mode: On' : 'Dark Mode: Off'"
        (onClick)="handleThemeChange()"
        [icons]="[Icons.DarkIcon, Icons.LightIcon]"/>

      <action-center-button
        class="flex flex-1"
        [active]="paletteOpen"
        [text]="getAccentColor() | titlecase"
        (onClick)="toggleFocusMode()"
        [icons]="[Icons.PaletteIcon]"/>

    </div>

    <div [@palette]="paletteOpen" class="flex flex-1 flex-col -mt-4 dark:bg-[#1d263a] bg-white/50 rounded-xl">
      <div
        class="flex-1 border-divider-light flex items-center justify-between border-b py-3 px-5 text-sm font-bold overflow-hidden dark:border-divider-dark z-10">
        <h2 id="table-of-contents" class="text-slate-700 dark:text-slate-300 ng-tns-c2354412650-8">
          Select color
        </h2>
      </div>

      <ul class="flex-1" [@paletteList]="paletteOpen">
        <li class="flex p-3 py-3 items-center" *ngFor="let color of colors">
          <div class="h-5 aspect-square bg-slate-600 dark:bg-slate-400 rounded-md"></div>
          <button type="button" (click)="changeAccent(color)" class="toc-link">{{color | titlecase}}</button>
        </li>
      </ul>
    </div>
  </div>
</div>
